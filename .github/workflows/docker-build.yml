name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch: # Allows manual trigger of the build pipeline

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Critical permission required to push images to GHCR

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true # Caches Go modules automatically to accelerate builds

      - name: Generate Go Sum File
        env:
          GOPROXY: "https://proxy.golang.org,direct"
          GOPRIVATE: ""
        run: |
          # Safe Reset: clear any conflicting global git redirect rules that force SSH/Auth on public repos
          git config --global --unset-all url.git@github.com:.insteadOf || true
          git config --global --unset-all url."git@github.com:".insteadOf || true
          git config --global --unset-all url."https://github.com/".insteadOf || true

          # Remove the hardcoded non-existent v1.0.0 version from go.mod first to prevent Go validation crash
          sed -i '/releasetitleparser/d' go.mod || true

          # Fetch the latest commit on master/main branch of releasetitleparser dynamically.
          # Go will resolve the branch to the exact latest commit and automatically write the correct pseudo-version.
          go get github.com/ovrlord-app/releasetitleparser@master || go get github.com/ovrlord-app/releasetitleparser@main

          # Tidy up go.mod and download dependencies cleanly
          go mod tidy
          go mod download

      - name: Downcase Repository Name
        run: |
          # GHCR tags require strictly lowercased repository paths.
          # Converts repository path to lowercase and stores it in GITHUB_ENV.
          echo "IMAGE_NAME=ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]' >> $GITHUB_ENV

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
